apiVersion: v1
kind: Secret
metadata:
  name: knowledgeops-secret
  namespace: knowledgeops
type: Opaque
stringData:
  DATABASE_URL: "postgresql://postgres:postgres@postgres-postgresql:5432/knowledgeops"
  GROQ_API_KEY: "your-groq-api-key"
  JWT_SECRET_KEY: "your-super-secret-key"
  REDIS_URL: "redis://redis-master:6379"
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"